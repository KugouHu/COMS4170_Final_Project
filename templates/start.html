<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zodiac Constellations</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container mt-5" style="max-width: 480px;">

  <div class="start-hero mb-1">
    <h1 class="mb-1" style="font-size: 2rem; letter-spacing: 0.08em;">Zodiac Constellations</h1>
    <p class="text-muted mb-0" style="font-size: 0.92rem; letter-spacing: 0.04em;">
      An interactive guide to the 12 constellations of the zodiac
    </p>
  </div>

  <div class="star-divider my-4">✦</div>

  <div class="card">
    <div class="card-body p-4">
      <h5 class="card-title mb-3" style="letter-spacing: 0.05em;">Begin Your Journey</h5>
      <form action="/" method="POST">
        <div class="mb-3">
          <label for="name" class="form-label">Your Name</label>
          <input type="text" class="form-control" id="name" name="name" required placeholder="Enter your name">
        </div>
        <div class="mb-4">
          <label for="birthday" class="form-label">Birthday</label>
          <input type="date" class="form-control" id="birthday" name="birthday" required>
          <div class="form-text mt-1">We'll highlight your personal zodiac sign throughout the site.</div>
        </div>
        <button type="submit" class="btn btn-primary w-100" style="letter-spacing: 0.04em;">
          Start Learning &nbsp;→
        </button>
      </form>
    </div>
  </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
