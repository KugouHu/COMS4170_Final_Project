<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zodiac Constellations</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container mt-5" style="max-width: 480px;">
  <h1 class="mb-1">Zodiac Constellations</h1>
  <p class="text-muted mb-4">An interactive guide to the 12 constellations of the zodiac.</p>

  <div class="card">
    <div class="card-body">
      <h5 class="card-title">Get Started</h5>
      <form action="/" method="POST">
        <div class="mb-3">
          <label for="name" class="form-label">Your Name</label>
          <input type="text" class="form-control" id="name" name="name" required placeholder="Enter your name">
        </div>
        <div class="mb-3">
          <label for="birthday" class="form-label">Birthday</label>
          <input type="date" class="form-control" id="birthday" name="birthday" required>
          <div class="form-text">We will highlight your personal zodiac sign throughout the website.</div>
        </div>
        <button type="submit" class="btn btn-primary w-100">Start Learning</button>
      </form>
    </div>
  </div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
