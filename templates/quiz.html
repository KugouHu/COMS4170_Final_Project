<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz - Question {{ n }} | Zodiac</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

{% include "navbar.html" %}

<div class="container mt-4" style="max-width: 700px;">

  <h4 style="font-size: 1.2rem; letter-spacing: 0.04em;">
    Zodiac Quiz &mdash; Question {{ n }} of {{ total }}
  </h4>
  <div class="progress mb-3" style="height: 5px;">
    <div class="progress-bar bg-success" style="width: {{ (n / total * 100)|int }}%;"></div>
  </div>

  <div class="card mb-3">
    <div class="card-body">
      <p class="fs-5 mb-3" style="color: #e8e8f8;">{{ question.question }}</p>

      {% if imgConstellation %}
      <div class="mb-3 text-center">
        <img src="{{ imgConstellation.image }}"
             alt="Constellation image"
             class="quizImg"
             style="max-height: 220px; max-width: 100%;">
      </div>
      {% endif %}

      <form action="/quiz/{{ n }}/answer" method="POST">
        {% for i in range(question.answers | length) %}
        <div class="mb-2">
          <button type="submit" name="answer" value="{{ i }}"
                  class="btn btn-outline-secondary w-100 text-start {% if prevAnswer == i %}active{% endif %}">
            <strong style="color: #f4c842;">{{ ['A', 'B', 'C', 'D'][i] }}.</strong>
            &nbsp;{{ question.answers[i] }}
          </button>
        </div>
        {% endfor %}
      </form>
    </div>
  </div>

  <div class="d-flex justify-content-between">
    {% if n > 1 %}
      <a href="/quiz/{{ n - 1 }}" class="btn btn-sm btn-outline-secondary">&larr; Previous</a>
    {% else %}
      <a href="/learn/12" class="btn btn-sm btn-outline-secondary">&larr; Back to Lessons</a>
    {% endif %}
    <a href="/home" class="btn btn-sm btn-outline-secondary">Home</a>
  </div>

</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
